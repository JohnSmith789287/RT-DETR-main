__include__: [
  '../dataset/dfire_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]


output_dir: ./output/rtdetrv2_r18vd_wt_hfp_wtconv_hfpfusion_dfire


PResNet:
  depth: 18
  freeze_at: -1
  freeze_norm: False
  pretrained: True


HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5

  # Original WT-HFP route: enhance projected C3/C4/C5 before AIFI/FPN.
  use_wt_hfp: True
  wt_hfp_apply_idx: [0, 1, 2]
  wt_hfp_wt_type: db1
  wt_hfp_kernel_size: 3

  # PHDL HAGConv-like fusion position: Concat -> WTConv-CSPRepLayer.
  use_wtconv_csp: True
  wtconv_csp_wt_type: db1
  wtconv_csp_kernel_size: 5
  wtconv_csp_levels: 1

  # PHDL LW-Fusion-like position: C_i + P_i -> HFP high-frequency fusion.
  use_hfp_fusion: True
  hfp_fusion_wt_type: db1
  hfp_fusion_kernel_size: 3
  hfp_fusion_init_alpha: 0.01


RTDETRTransformerv2:
  num_layers: 3


epoches: 120

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.


train_dataloader:
  total_batch_size: 16
  dataset:
    transforms:
      policy:
        epoch: 117
  collate_fn:
    scales: ~
    stop_epoch: 117


val_dataloader:
  total_batch_size: 32
