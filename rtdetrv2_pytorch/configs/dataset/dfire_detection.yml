task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

# D-FIRE: 2 classes -> 0 = smoke, 1 = fire
num_classes: 2
remap_mscoco_category: False


train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ./dataset/dfire/images/train/
    ann_file: ./dataset/dfire/annotations/instances_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFuncion


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ./dataset/dfire/images/val/
    ann_file: ./dataset/dfire/annotations/instances_val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFuncion
